version: 2
updates:
  # npm dependencies — Dependabot's security-update path (separate from this
  # schedule) opens PRs for known-vulnerable versions as soon as an advisory
  # is published, regardless of this weekly cadence; this section covers
  # routine version-bump PRs so dependencies don't just quietly go stale.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Most @types/*, eslint, and other dev-only bumps are low-risk and
      # noisy one at a time — bundle them into a single PR to review instead
      # of a dozen near-identical ones.
      #
      # Restricted to patch releases only: dependabot-automerge.yml's 0.x
      # guard checks fetch-metadata's singular `previous-version` output,
      # which for a grouped PR is just the *first* dependency in the group,
      # not an aggregate — so a minor/major bump hiding among several
      # grouped patch bumps could dodge the guard by reporting an unrelated
      # dependency's version. Keeping minor/major dev bumps ungrouped means
      # each becomes its own PR, where the singular outputs are always
      # correct for that one dependency.
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "patch"

  # Actions are pinned to commit SHAs (see .github/workflows/*.yml) as
  # defense in depth against a compromised/republished version tag —
  # Dependabot still tracks and opens PRs to bump the pinned SHA forward
  # when a new release exists, so that pinning doesn't silently calcify.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
