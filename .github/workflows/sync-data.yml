name: Sync bank data

on:
  # v8.0 §13: sync_scope lets a manual dispatch choose exactly one path
  # (fdic-only or both) instead of a bare `workflow_dispatch` trigger firing
  # every job at once — a prior design let one manual run launch
  # sync-ncua-and-assets, sync-institution-directory-fdic, and
  # sync-institution-directory-full simultaneously, racing each other.
  workflow_dispatch:
    inputs:
      sync_scope:
        type: choice
        options: [fdic, both]
        default: both
  schedule:
    # Rail participant lists (FedNow/RTP/Zelle) — banks onboard to these
    # networks fairly often, so check weekly. Sundays 09:00 UTC (off-peak).
    - cron: "0 9 * * 0"
    # NCUA credit union directory + total_assets backfill — NCUA only
    # publishes new call report data quarterly, so monthly is enough to
    # pick up a new quarter promptly without syncing the same file weekly.
    # 1st of the month, 09:00 UTC.
    - cron: "0 9 1 * *"

jobs:
  # Secrets are set per-step (only on the actual sync scripts), not at job
  # level — job-level env is inherited by every step including `npm ci`,
  # which runs every installed package's lifecycle scripts; a compromised
  # transitive dependency could otherwise read and exfiltrate the
  # production service-role key during install. Actions are pinned to a
  # commit SHA rather than a mutable version tag (defense in depth against
  # a compromised/republished tag silently pulling different code); the
  # trailing comment records which released version each SHA corresponds
  # to, since that's no longer visible from the ref itself.
  sync-rail-participants:
    if: github.event.schedule == '0 9 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Prevents two runs of this job from ever executing concurrently (e.g. a
    # manual workflow_dispatch overlapping the scheduled run) — the sync
    # scripts stamp each row with a run timestamp and delete anything older
    # once their own insert finishes, so two interleaved runs could delete
    # each other's freshly-inserted rows. Queues rather than cancels, since
    # a sync already in progress shouldn't be killed mid-run.
    concurrency:
      group: sync-rail-participants
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: npm ci
      - run: node scripts/sync-rail-participants.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: node scripts/sync-zelle-participants.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: node scripts/backfill-rail-participation.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  sync-ncua-and-assets:
    if: github.event.schedule == '0 9 1 * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_scope == 'both')
    runs-on: ubuntu-latest
    concurrency:
      group: sync-ncua-and-assets
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: npm ci
      - run: node scripts/sync-ncua-directory.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: node scripts/backfill-bank-assets.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # v8.0 §13: the complete FDIC/NCUA institution-directory sync (as opposed
  # to sync-ncua-and-assets above, which only refreshes ncua_credit_unions/
  # total_assets for institutions already linked). Ships staged-only for
  # now — no --apply step here yet. finalize_sync_run is only ever invoked
  # by a human explicitly running `--apply --run-id <id>` after reviewing a
  # real staged run's report; wiring an automatic --apply into this
  # workflow is a deliberate later step (v8.0 rollout order, step 10), not
  # part of this release.
  sync-institution-directory-fdic:
    if: github.event.schedule == '0 9 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_scope == 'fdic')
    runs-on: ubuntu-latest
    concurrency:
      group: sync-institution-directory
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: npm ci
      - run: node scripts/sync-institution-directory.mjs --source fdic
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # The report is the only way to actually review a staged run's real
      # diff before approving --apply — it's real institution data, so it
      # goes to a private workflow artifact, never committed or logged in
      # full. `if: always()` so a guard_blocked run's (smaller) report
      # still uploads even though the step above technically "failed"
      # (non-zero exit).
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: institution-sync-report-fdic-${{ github.run_id }}
          path: scripts/reports/institution-sync-*.json
          retention-days: 90

  # Same-run job, not a separate cron-triggered run — shares
  # sync-ncua-and-assets's trigger via `needs:` so the NCUA reference sync
  # (and its ncua_reference_sync_log row) is guaranteed to have already run
  # this run before the institution sync reads it for the ncua scope. A
  # `needs:` dependency only orders jobs within one triggered run; it
  # cannot coordinate across the separate run that the weekly fdic-only
  # cron creates on a day both schedules coincide (see the plan's research
  # notes) — which is exactly why this job is scoped to the monthly
  # trigger only, never the weekly one.
  sync-institution-directory-full:
    needs: sync-ncua-and-assets
    if: github.event.schedule == '0 9 1 * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_scope == 'both')
    runs-on: ubuntu-latest
    concurrency:
      group: sync-institution-directory
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: npm ci
      - run: node scripts/sync-institution-directory.mjs --source both
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: institution-sync-report-full-${{ github.run_id }}
          path: scripts/reports/institution-sync-*.json
          retention-days: 90

  # Re-detects same-name duplicate institutions and the rail-flag drift
  # they cause (a legacy community-added row silently disagreeing with a
  # later-linked authoritative charter — the Wells Fargo/Bank of America/TD
  # Bank pattern fixed in v8.14.2/v8.14.3) without relying on a human
  # remembering to run these audits by hand. Runs on every trigger,
  # unconditionally — unlike the FDIC/NCUA-specific jobs above, a name
  # collision isn't scope-specific. Both scripts are read-only (they never
  # write to `banks`), so unlike every other job here there's no
  # interleaved-write risk and no concurrency group is needed. A non-zero
  # exit means "there's a confirmed or flagged pair to review," not a
  # script failure — surfaced as a red X plus GitHub's own default
  # scheduled-workflow-failure email, same alerting the rest of this
  # workflow already gets for free. Merging is still a separate, human-run
  # `apply-duplicate-merge.mjs --apply` — this job only detects.
  audit-duplicate-institutions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: npm ci
      - run: node scripts/audit-duplicate-institutions.mjs
        if: always()
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: node scripts/audit-duplicate-name-rail-flags.mjs
        if: always()
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Real institution data — private artifact only, per ADR-0006 §12,
      # never logged/committed in full. `if: always()` so the reports still
      # upload even though a non-empty result makes the step above "fail".
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: duplicate-institutions-audit-${{ github.run_id }}
          path: |
            scripts/reports/duplicate-institutions-audit-*.json
            scripts/reports/duplicate-name-rail-flags-audit-*.json
          retention-days: 90
