name: Sync bank data

on:
  workflow_dispatch:
  schedule:
    # Rail participant lists (FedNow/RTP/Zelle) — banks onboard to these
    # networks fairly often, so check weekly. Sundays 09:00 UTC (off-peak).
    - cron: "0 9 * * 0"
    # NCUA credit union directory + total_assets backfill — NCUA only
    # publishes new call report data quarterly, so monthly is enough to
    # pick up a new quarter promptly without syncing the same file weekly.
    # 1st of the month, 09:00 UTC.
    - cron: "0 9 1 * *"

jobs:
  # Secrets are set per-step (only on the actual sync scripts), not at job
  # level — job-level env is inherited by every step including `npm ci`,
  # which runs every installed package's lifecycle scripts; a compromised
  # transitive dependency could otherwise read and exfiltrate the
  # production service-role key during install. Actions are pinned to a
  # commit SHA rather than a mutable version tag (defense in depth against
  # a compromised/republished tag silently pulling different code); the
  # trailing comment records which released version each SHA corresponds
  # to, since that's no longer visible from the ref itself.
  sync-rail-participants:
    if: github.event.schedule == '0 9 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Prevents two runs of this job from ever executing concurrently (e.g. a
    # manual workflow_dispatch overlapping the scheduled run) — the sync
    # scripts stamp each row with a run timestamp and delete anything older
    # once their own insert finishes, so two interleaved runs could delete
    # each other's freshly-inserted rows. Queues rather than cancels, since
    # a sync already in progress shouldn't be killed mid-run.
    concurrency:
      group: sync-rail-participants
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/sync-rail-participants.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: node scripts/sync-zelle-participants.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: node scripts/backfill-rail-participation.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  sync-ncua-and-assets:
    if: github.event.schedule == '0 9 1 * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: sync-ncua-and-assets
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/sync-ncua-directory.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: node scripts/backfill-bank-assets.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
