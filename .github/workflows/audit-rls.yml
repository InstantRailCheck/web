name: Audit RLS/privilege manifest

on:
  workflow_dispatch:
  schedule:
    # Daily — this is meant to catch drift (e.g. a policy or grant changed
    # directly via the Supabase dashboard, bypassing migration review) soon
    # after it happens, not just whenever someone thinks to check.
    - cron: "0 12 * * *"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: npm ci
      - run: node scripts/audit-rls-manifest.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
