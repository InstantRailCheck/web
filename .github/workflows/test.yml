name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build

  # Real local Postgres coverage (v7.2) — separate from the `test` job
  # above, which is fully mocked and has no database to talk to. Spins up
  # the actual migration history via the Supabase CLI (already a
  # devDependency) on the runner's preinstalled Docker, applying every
  # file in supabase/migrations/ to a fresh instance, then runs
  # scripts/db-tests/ against it. Never touches production.
  db-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - run: npm ci
      - run: npx supabase start
      - run: npm run test:db
