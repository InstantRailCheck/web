<svg width="680" height="153" viewBox="0 0 680 153" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">InstantRailCheck logo</title>
  <desc id="desc">A rail-shaped checkmark inside a clock beside the InstantRailCheck wordmark.</desc>
  <defs>
    <linearGradient id="markGradient" x1="18" y1="20" x2="134" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.48" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="railGradient" x1="38" y1="100" x2="120" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.62 0 0 0 0 0.95 0 0 0 0.26 0"/>
      <feBlend in2="SourceGraphic" mode="normal"/>
    </filter>
  </defs>

  <g filter="url(#softGlow)">
    <circle cx="76.5" cy="76.5" r="58" stroke="url(#markGradient)" stroke-width="9"/>
    <path d="M76.5 34.5V47.5" stroke="#E0F2FE" stroke-width="7" stroke-linecap="round"/>
    <path d="M76.5 105.5V118.5" stroke="#E0F2FE" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
    <path d="M34.5 76.5H47.5" stroke="#E0F2FE" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
    <path d="M105.5 76.5H118.5" stroke="#E0F2FE" stroke-width="7" stroke-linecap="round"/>
    <path d="M43 92L63.5 112.5L116 55" stroke="url(#railGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M42 72H84" stroke="#0F172A" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
    <path d="M49 83H74" stroke="#0F172A" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
  </g>

  <g>
    <text x="162" y="69" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="45" font-weight="800" letter-spacing="0">
      InstantRailCheck
    </text>
    <text x="165" y="104" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="600" letter-spacing="0.8">
      verify before you transfer
    </text>
    <path d="M166 119H605" stroke="#1E293B" stroke-width="3" stroke-linecap="round"/>
    <path d="M166 119H331" stroke="url(#markGradient)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
