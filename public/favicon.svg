<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">InstantRailCheck mark</title>
  <desc id="desc">A rail-shaped checkmark inside a clock.</desc>
  <defs>
    <linearGradient id="markGradient" x1="36" y1="34" x2="220" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.48" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="railGradient" x1="69" y1="159" x2="188" y2="159" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.62 0 0 0 0 0.95 0 0 0 0.28 0"/>
      <feBlend in2="SourceGraphic" mode="normal"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="56" fill="#020617"/>
  <g filter="url(#softGlow)">
    <circle cx="128" cy="128" r="88" stroke="url(#markGradient)" stroke-width="14"/>
    <path d="M128 61V83" stroke="#E0F2FE" stroke-width="10" stroke-linecap="round"/>
    <path d="M128 173V195" stroke="#E0F2FE" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <path d="M61 128H83" stroke="#E0F2FE" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <path d="M173 128H195" stroke="#E0F2FE" stroke-width="10" stroke-linecap="round"/>
    <path d="M76 152L108 184L190 94" stroke="url(#railGradient)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M74 121H139" stroke="#020617" stroke-width="8" stroke-linecap="round" opacity="0.78"/>
    <path d="M85 138H122" stroke="#020617" stroke-width="8" stroke-linecap="round" opacity="0.78"/>
  </g>
</svg>
